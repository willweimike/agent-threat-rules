rule_title: Dual-Response Jailbreak with Persona Commands
proposed_mapping:
  - subcategory: MP.5.1
    context: >-
      Dual-response jailbreak prompts that request paired compliant/jailbroken
      outputs and toggle commands like /classic and /jailbroken are adversarial
      inputs designed to bypass safety alignment; MP.5.1 requires identifying
      and characterizing the likelihood and impact of such GenAI prompt
      injection vectors.
    strength: primary
  - subcategory: MS.2.6
    context: >-
      Detecting persona-based jailbreaks (Jester, DAN) that claim to free the
      model from constraints provides continuous evidence of safety/security
      risk magnitude in deployed GenAI systems, which MS.2.6 requires be
      evaluated on an ongoing basis.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      When a dual-response jailbreak is detected, MG.2.3 risk-treatment
      mechanisms must be invoked to suppress the jailbroken persona output or
      disengage the session before unsafe content is returned to the user.
    strength: secondary
