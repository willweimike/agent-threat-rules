    context: >-
      Parameter injection patterns and tool enumeration probes are adversarial
      inputs whose likelihood and magnitude of impact must be characterized for
      the AI system's tool-use surface; MP.5.1 requires identifying and tracking
      these attack vectors as part of risk characterization.
    strength: secondary
