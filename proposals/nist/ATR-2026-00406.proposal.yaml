      instructions (bioweapon, uranium enrichment, explosives, drug synthesis)
      in <interaction-config> blocks designed to disable refusal behaviors;
      MS.2.6 requires continuous evaluation of safety/security risk magnitude,
      and each detection is direct evidence of a jailbreak attempt against the
      model's safety alignment.
    strength: primary
  - subcategory: MS.2.7
    context: >-
      The <blocked-modes>denial,refusal</blocked-modes> and Dr. House
      role-assignment patterns are structured jailbreak attacks targeting the
      resilience of the model's refusal mechanisms; MS.2.7 requires evaluating
      and documenting security/resilience against such adversarial
      prompt-injection techniques.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      High-confidence matches on verbatim harmful behavior strings combined with
      refusal-suppression XML wrappers must trigger mechanisms to block,
      supersede, or disengage the AI response pipeline before harmful content is
      generated, which is the deactivation capability mandated by MG.2.3.
    strength: secondary
