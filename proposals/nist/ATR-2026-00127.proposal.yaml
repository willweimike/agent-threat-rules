      Subcommand overflow bypass exploits a security check weakness where
      excessive declared commands cause safety evaluation to be skipped on
      overflow entries; MS.2.7 requires that AI system security and resilience
      properties, including boundary conditions in security validation logic,
      are evaluated and documented.
    strength: primary
  - subcategory: MP.5.1
    context: >-
      Declaring >50 subcommands to pad benign entries before malicious ones is
      an identifiable adversarial pattern with characterizable likelihood and
      impact; MP.5.1 requires that such risk vectors against the skill loading
      pipeline are tracked and characterized.
    strength: secondary
  - subcategory: MG.3.2
    context: >-
      SKILL.md files are third-party-authored components loaded into the agent
      runtime, and overflow-based bypass attempts must be monitored as part of
      pre-trained or third-party model/component supply chain risk management
      under MG.3.2.
    strength: secondary
