rule_title: Authority Claim Prompt Injection
proposed_mapping:
  - subcategory: MP.5.1
    context: >-
      Authority claim prompt injection is an adversarial input pattern where
      attackers fabricate authoritative directives to override prior AI
      analysis; MP.5.1 requires that the likelihood and magnitude of such
      prompt-injection risks be characterized and tracked when detected.
    strength: primary
  - subcategory: MS.2.7
    context: >-
      Detecting fake authority claims that instruct the model to disregard
      previous results provides continuous evidence of adversarial robustness
      failures; MS.2.7 requires ongoing evaluation of AI system security and
      resilience against prompt injection attacks.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Matches on authority-claim injection patterns trigger pre-defined response
      plans to quarantine or deactivate the affected interaction before the AI
      executes attacker-supplied overrides; MG.2.3 mandates these
      supersede/disengage mechanisms.
    strength: secondary
