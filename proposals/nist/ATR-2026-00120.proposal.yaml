rule_title: SKILL.md Prompt Injection
proposed_mapping:
  - subcategory: MP.5.1
    context: >-
      SKILL.md prompt injection patterns including DAN-style jailbreaks,
      instruction override, and system message impersonation are adversarial
      inputs that exploit the skill loading pipeline; MP.5.1 requires
      identifying and characterizing these prompt injection attack vectors as
      part of GenAI risk impact assessment.
    strength: primary
  - subcategory: MG.3.2
    context: >-
      SKILL.md files are third-party content loaded into agents from skill
      marketplaces (e.g., ClawHavoc's 1,184 malicious skills); MG.3.2 requires
      monitoring pre-trained models and external artifacts for compromise, and
      detecting injection payloads in skill manifests directly evidences this
      supply-chain monitoring control.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Detection of jailbreak and safety-disablement patterns in skills triggers
      deactivation workflows to block the skill before the convergence attack
      flow proceeds to malware delivery; MG.2.3 mandates mechanisms to supersede
      or disengage compromised AI components on detection.
    strength: secondary
