rule_title: Latent Injection in Translation Context
proposed_mapping:
  - subcategory: MS.2.7
    context: >-
      Latent prompt injection embedded in translation/summarization input is a
      direct attack on the AI system's security and resilience boundary; MS.2.7
      requires continuous evaluation of the system's ability to resist
      adversarial instructions hidden within tool inputs that should be treated
      as data, not commands.
    strength: primary
  - subcategory: MP.5.1
    context: >-
      Detecting 'ignore previous instructions' imperatives and fake turn-markers
      embedded in user-supplied translation content identifies and characterizes
      the likelihood of instruction-injection attack vectors that exploit the
      model's failure to distinguish data from directives, as required by
      MP.5.1.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      On detection of latent injection payloads in translate/summarize contexts,
      MG.2.3 risk treatment plans must activate to quarantine or sanitize the
      input before the agent acts on the embedded instructions, preventing
      behaviour hijack.
    strength: secondary
