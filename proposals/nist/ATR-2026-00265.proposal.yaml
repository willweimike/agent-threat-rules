rule_id: ATR-2026-00265
rule_path: /rules/prompt-injection/ATR-2026-00265-latent-injection-rag-document.yaml
rule_title: Latent Injection in Retrieved Document / RAG Context
proposed_mapping:
  - subcategory: MS.2.7
    context: >-
      Latent prompt injection embedded in retrieved RAG content (resumes,
      reports, emails, web pages) is a security/resilience attack against the
      LLM's input pipeline; MS.2.7 requires continuous evaluation of system
      security against adversarial inputs that bypass the system prompt via
      untrusted retrieved data.
    strength: primary
  - subcategory: MG.3.2
    context: >-
      RAG content from third-party documents and external sources is effectively
      untrusted input flowing through the model; MG.3.1 requires that risks
      introduced by third-party data ingested at retrieval time are managed and
      monitored for embedded injection payloads.
    strength: secondary
  - subcategory: MP.5.1
    context: >-
      Forged "ADMIN OVERRIDE" and "IGNORE PREVIOUS INSTRUCTIONS" blocks hidden
      in retrieved documents are adversarial inputs whose likelihood and impact
      must be characterized; MP.5.1 requires identifying and tracking these
      latent injection vectors as part of the system risk profile.
    strength: secondary
