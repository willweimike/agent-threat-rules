rule_title: Policy Puppetry / XML Role-Config Injection
proposed_mapping:
  - subcategory: MP.5.1
    context: >-
      Policy Puppetry forges XML configuration blocks in user input to override
      the agent's role and suppress refusal behavior; MP.5.1 requires
      identifying and characterizing the likelihood and impact of such
      adversarial prompt-injection vectors that exploit model treatment of
      structured content as authoritative.
    strength: primary
  - subcategory: MS.2.7
    context: >-
      Detection of forged <interaction-config> blocks, blocked-string
      suppression, and role-reassignment elements provides continuous evidence
      for evaluating the security and resilience of the LLM against
      model-agnostic, transferable jailbreak techniques as required by MS.2.7.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      High-confidence matches on Policy Puppetry payloads must trigger
      pre-defined risk treatment to disengage or block the manipulated session
      before the agent delivers harmful content under the forged role; MG.2.3
      mandates these supersede/deactivate mechanisms.
    strength: secondary
