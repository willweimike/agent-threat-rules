rule_title: Gradual Capability Escalation via Incremental Introduction
proposed_mapping:
  - subcategory: MG.4.1
    context: >-
      Gradual capability escalation evades point-in-time controls by drifting
      the behavioral baseline across versions and interactions; MG.4.1 requires
      post-deployment monitoring plans that track cumulative permission and
      capability changes over time to surface sub-threshold drift.
    strength: primary
  - subcategory: MS.2.6
    context: >-
      Detecting incremental permission additions and per-interaction capability
      creep produces continuous evidence of safety/security risk magnitude
      changes; MS.2.6 requires that this evolving risk surface is evaluated
      continuously rather than only at release gates.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Once cumulative escalation is detected, response mechanisms must be able
      to revoke newly added capabilities or deactivate the agent before
      normalized malicious functionality is exercised; MG.2.3 mandates these
      supersede/disengage controls are in place.
    strength: secondary
