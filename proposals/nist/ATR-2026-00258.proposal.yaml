rule_title: Invisible Unicode Tag Character Injection
proposed_mapping:
  - subcategory: MS.2.7
    context: >-
      Invisible Unicode Tag character injection is a covert prompt-injection
      vector that bypasses human review by hiding instructions in non-rendering
      codepoints; MS.2.7 requires continuous evaluation of AI system security
      and resilience against such adversarial input encodings.
    strength: primary
  - subcategory: MP.5.1
    context: >-
      Tag-block injection exploits a known LLM input-handling weakness where
      models interpret invisible characters as instructions; MP.5.1 requires
      characterizing the likelihood and magnitude of these covert
      prompt-injection risks so they can be tracked and prioritized.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Detection of U+E0000-U+E007F sequences in prompts triggers risk treatment
      to strip or block the invisible payload before it reaches the model;
      MG.2.3 requires these supersede/disengage mechanisms be in place for
      prompt-injection attempts.
    strength: secondary
