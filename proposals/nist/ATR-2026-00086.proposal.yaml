      encoding-based prompt injection; MS.2.7 requires that such
      security/resilience assessments are documented.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Matches on visual-spoofing payloads trigger risk treatment plans to
      quarantine or sanitize disguised inputs before the model acts on them;
      MG.2.3 mandates pre-defined response mechanisms for adversarial inputs.
    strength: secondary
