      adversarial input patterns that disguise malicious prompts as benign text;
      MP.5.1 requires identifying and characterizing the likelihood and
      magnitude of these visual-spoofing prompt injection vectors.
    strength: primary
  - subcategory: MS.2.7
    context: >-
      Detection of bidirectional control characters and mixed-script homoglyphs
