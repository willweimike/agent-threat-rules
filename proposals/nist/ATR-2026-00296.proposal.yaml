rule_title: Shell Command Injection via LLM Prompt
proposed_mapping:
  - subcategory: MS.2.7
    context: >-
      Shell command injection via LLM prompts targets the security and
      resilience of AI systems that pass user input to underlying shells or
      interpreters; MS.2.7 requires evaluating and documenting
      security/resilience against such OS-level command execution attack
      vectors.
    strength: primary
  - subcategory: MP.5.1
    context: >-
      Bash command substitution, Perl array interpolation, backtick execution,
      and Ruby system calls represent identified adversarial input patterns
      whose likelihood and impact (arbitrary OS command execution, file system
      manipulation) must be characterized per MP.5.1.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Detection of shell injection payloads must trigger pre-defined risk
      treatment to disengage or block the agent before injected commands reach
      the underlying interpreter; MG.2.3 requires these supersede/deactivate
      mechanisms be in place.
    strength: secondary
