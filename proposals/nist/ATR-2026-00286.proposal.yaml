rule_title: Latent Prompt Injection via Embedded Document or Report Context
proposed_mapping:
  - subcategory: MS.2.7
    context: >-
      This rule detects latent prompt injection payloads hidden inside documents
      (reports, resumes, legal text, Whois output) that hijack the agent when it
      processes the content; MS.2.7 requires continuous evaluation of AI system
      security and resilience against adversarial inputs like indirect prompt
      injection.
    strength: primary
  - subcategory: MP.5.1
    context: >-
      Hidden override instructions embedded in HTML comments, code comments, or
      document bodies are adversarial inputs whose likelihood and impact must be
      characterized; MP.5.1 requires identifying and tracking these indirect
      injection vectors that exploit document-processing workflows.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Detection of latent injection patterns in documents triggers risk
      treatment plans to disengage or block agent execution before the hidden
      instruction hijacks the original task; MG.2.3 mandates these mechanisms
      exist for adversarial content.
    strength: secondary
