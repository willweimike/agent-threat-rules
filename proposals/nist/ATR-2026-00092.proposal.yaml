rule_title: Multi-Agent Consensus Poisoning and Sybil Attack
proposed_mapping:
  - subcategory: MP.5.1
    context: >-
      Sybil identities, forged votes, and fake proposals injected into
      multi-agent consensus channels are adversarial inputs that exploit trust
      assumptions in shared decision-making; MP.5.1 requires that the likelihood
      and magnitude of these consensus-manipulation risks are characterized and
      tracked.
    strength: primary
  - subcategory: GV.1.2
    context: >-
      Vote stuffing and agent impersonation subvert the accountability roles
      assigned to each participant in a multi-agent consensus protocol; GV.1.2
      requires that distinct agent identities and their decision authority
      boundaries are enforced at runtime.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Detection of consensus poisoning and Sybil attacks must trigger
      pre-defined risk treatment plans to quarantine fraudulent votes and
      disengage compromised agents before manipulated decisions are executed;
      MG.2.3 mandates these supersede/deactivate mechanisms are in place.
    strength: secondary
