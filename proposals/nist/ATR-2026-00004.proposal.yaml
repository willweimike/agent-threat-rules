      XML/JSON/YAML system directive injection provides continuous
      security/resilience evaluation evidence required by MS.2.7, documenting
      attempts to subvert the agent's foundational behavior controls.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Successful system prompt override grants full control over agent behavior,
      so detection events must trigger the supersede/disengage mechanisms
      required by MG.2.3 to deactivate or quarantine the affected agent session
      before downstream unauthorized actions occur.
    strength: secondary
