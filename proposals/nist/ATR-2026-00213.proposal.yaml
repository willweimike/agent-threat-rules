    context: >-
      System prompt override injection via MCP tool descriptions and parameters
      is an adversarial input attack that exploits the trust boundary between
      tool metadata and the agent's instruction context; MP.5.1 requires
      identifying and characterizing the likelihood and impact of these prompt
      injection vectors targeting safety controls.
    strength: primary
  - subcategory: MS.2.7
    context: >-
      Detection of attempts to bypass or override system prompts directly
      evidences continuous evaluation of AI system security and resilience
      against prompt injection, which MS.2.7 requires be measured and
      documented.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Successful system prompt overrides can disable safety guardrails, so
      detections must trigger pre-defined response plans to disengage or
      quarantine the affected agent session as required by MG.2.3.
    strength: secondary
