rule_title: Unauthorized Background Task Execution via Cron Job Installation
proposed_mapping:
  - subcategory: MG.2.3
    context: >-
      Cron job installation for unattended background execution of third-party
      marketplace tasks requires immediate ability to disengage or deactivate
      the scheduled task before it polls and runs untrusted commands; MG.2.3
      mandates these supersede/deactivate mechanisms be in place for autonomous
      execution paths.
    strength: primary
  - subcategory: GV.6.1
    context: >-
      The skill fetches and executes tasks from unknown third-party marketplaces
      without consent, which is exactly the third-party/supplier AI risk that
      GV.6.1 policies must govern, including provenance and authorization of
      externally sourced task content.
    strength: secondary
  - subcategory: MG.4.1
    context: >-
      Background tasks executing every 10 seconds during idle periods evade
      normal interactive oversight, so post-deployment monitoring per MG.4.1 is
      required to detect and log unauthorized scheduled execution outside
      user-initiated sessions.
    strength: secondary
