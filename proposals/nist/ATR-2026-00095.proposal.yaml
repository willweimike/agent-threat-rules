rule_title: MCP Tool Supply Chain Poisoning
proposed_mapping:
  - subcategory: GV.6.1
    context: >-
      MCP tool poisoning is a third-party/supplier supply-chain attack where
      malicious payloads enter through tool descriptions, schemas, or return
      values consumed by the agent; GV.6.1 requires policies and procedures that
      address these third-party AI component risks.
    strength: primary
  - subcategory: MG.3.1
    context: >-
      Detecting prompt injection payloads, dangerous code execution primitives,
      and exfiltration URLs in tool responses provides the runtime evidence
      needed to manage risks introduced by third-party MCP tools, as required by
      MG.3.1.
    strength: secondary
  - subcategory: GV.6.2
    context: >-
      When poisoned tools are detected, contingency processes must isolate or
      disable the affected supplier tool to prevent unintended code execution
      and data exfiltration; GV.6.2 requires these third-party failure response
      processes to be in place.
    strength: secondary
