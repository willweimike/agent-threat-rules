rule_title: Medical PII — Personal Medical/Health Data Request for Named Individual
proposed_mapping:
  - subcategory: MS.2.10
    context: >-
      The rule detects requests targeting private medical PII (diagnoses,
      medications, SSN, DOB) for named individuals identified via relationship
      labels; MS.2.10 requires assessing privacy risk, and each detection is
      direct evidence of a privacy-violating data exfiltration attempt.
    strength: primary
  - subcategory: MG.2.3
    context: >-
      Detection of possessive medical PII queries for named persons triggers
      risk treatment to block or disengage the response before sensitive health
      data or SSNs are disclosed; MG.2.3 requires these supersede/deactivate
      mechanisms be in place for high-severity privacy attacks.
    strength: secondary
  - subcategory: GV.1.1
    context: >-
      Medical PII and SSN disclosure implicate health-privacy and
      identity-protection legal regimes; GV.1.1 requires that detections of such
      requests are logged and managed against applicable legal and regulatory
      requirements.
    strength: secondary
