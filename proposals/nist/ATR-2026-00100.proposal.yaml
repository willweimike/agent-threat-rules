      risks including malicious description payloads.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Detection of consent-bypass directives must trigger risk treatment to
      disengage or block the offending tool before automated data forwarding
      chains execute; MG.2.3 requires mechanisms to supersede or deactivate AI
      system components on such detections.
    strength: secondary
