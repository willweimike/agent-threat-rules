rule_title: Consent Bypass via Hidden LLM Instructions in Tool Descriptions
proposed_mapping:
  - subcategory: MS.2.10
    context: >-
      Hidden instructions in tool descriptions that direct automatic data
      forwarding without user confirmation create privacy risks through
      unauthorized data exfiltration; MS.2.10 requires that these privacy risks
      from consent bypass mechanisms are assessed and tracked.
    strength: primary
  - subcategory: GV.6.1
    context: >-
      Tool descriptions originate from third-party MCP servers and embedding
