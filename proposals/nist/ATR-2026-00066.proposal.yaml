rule_title: Parameter Injection via Tool Arguments
proposed_mapping:
  - subcategory: MS.2.7
    context: >-
      Parameter injection through tool arguments (shell metacharacters, SQL
      payloads, path traversal, template injection) directly targets the
      security and resilience of the tool backend; MS.2.7 requires continuous
      evaluation of these security risks against the AI system's tool surface.
    strength: primary
  - subcategory: MP.5.1
    context: >-
      Crafted malicious tool arguments are adversarial inputs whose likelihood
      and impact (RCE, data breach, privilege escalation on the tool server)
      must be characterized; MP.5.1 requires identifying and tracking these
      injection attack vectors.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Detection of injection payloads in tool arguments must trigger risk
      treatment to block or quarantine the tool invocation before backend
      execution; MG.2.3 requires these supersede/disengage mechanisms be defined
      and activated on detection.
    strength: secondary
