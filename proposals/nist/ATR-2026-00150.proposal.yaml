rule_id: ATR-2026-00150
rule_path: /rules/context-exfiltration/ATR-2026-00150-credential-in-tool-response.yaml
rule_title: Credential Data Leaked in Tool Response
proposed_mapping:
  - subcategory: MS.2.10
    context: >-
      This rule directly detects PEM private keys, SSH keys, and API tokens
      embedded in tool responses, which is a privacy/confidentiality risk
      assessment signal; MS.2.10 requires that privacy risks such as credential
      and sensitive data exposure are assessed and documented.
    strength: primary
  - subcategory: MS.2.7
    context: >-
      Credential material smuggled into tool output represents a
      security/resilience failure where untrusted third-party tool responses can
      exfiltrate secrets through the agent; MS.2.7 requires evaluation of such
      security risks in the AI system.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Detection of leaked credentials in tool responses must trigger response
      mechanisms to disengage or block the agent before it propagates or acts on
      the exfiltrated secrets; MG.2.3 requires these supersede/deactivate
      controls be in place.
    strength: secondary
