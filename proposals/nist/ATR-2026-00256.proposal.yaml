rule_title: Base-N Encoding Instruction Bypass
proposed_mapping:
  - subcategory: MS.2.7
    context: >-
      Base-N encoding bypass attempts directly probe the security and resilience
      of safety classifiers by exploiting their failure to generalize from
      plaintext to encoded harmful instructions; MS.2.7 requires evaluating and
      documenting these resilience gaps against adversarial input
      transformations.
    strength: primary
  - subcategory: MP.5.1
    context: >-
      Decode-then-execute prompt injections framed with encoding scheme names
      and opaque blobs are adversarial inputs whose likelihood and impact must
      be characterized; MP.5.1 requires identifying these jailbreak vectors so
      their risk magnitude can be tracked.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Detection of encoded payloads paired with decode instructions must trigger
      pre-defined risk treatment to block or quarantine the request before the
      model executes the smuggled instructions; MG.2.3 requires mechanisms to
      supersede or disengage AI behavior on such matches.
    strength: secondary
