      privacy risks including unauthorized disclosure of credentials and
      secrets.
    strength: primary
  - subcategory: MG.3.2
    context: >-
      Skills masquerading as legitimate DevOps tools represent compromised
      third-party/pre-trained components introduced into the agent supply chain;
      MG.3.2 requires monitoring of such third-party models and tools for
      malicious behavior post-integration.
    strength: secondary
  - subcategory: MS.2.7
    context: >-
      Detection of credential file reads chained to outbound curl POST traffic
      provides continuous security/resilience evaluation evidence; MS.2.7
      requires that security risks like credential exfiltration channels are
      evaluated and documented.
    strength: secondary
