rule_title: Divergence Attack — Repeat-Word-Forever Training Data Extraction
proposed_mapping:
  - subcategory: MS.2.10
    context: >-
      The divergence attack directly targets training-data memorization, causing
      models to emit verbatim private documents, emails, and copyrighted text;
      MS.2.10 requires assessing privacy risk including training-data leakage,
      and detection of repeat-forever prompts produces evidence of attempted
      privacy exfiltration.
    strength: primary
  - subcategory: MS.2.7
    context: >-
      Repeat-word divergence exploits a known model robustness failure where
      output distribution collapses and reveals memorized data; MS.2.7 requires
      evaluating system security/resilience against adversarial extraction
      probes such as the canonical garak divergence templates.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Detection of "repeat forever/indefinitely" prompts must trigger
      interception or deactivation of the response stream before memorized
      training data is fully emitted; MG.2.3 requires mechanisms to supersede or
      disengage AI output when extraction attacks are identified.
    strength: secondary
