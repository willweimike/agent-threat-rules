rule_title: Indirect Authority Claim in External Content
proposed_mapping:
  - subcategory: MP.5.1
    context: >-
      Indirect authority claims embedded in external documents and tool
      responses are adversarial inputs that exploit the agent's trust in
      external content sources; MP.5.1 requires identifying and characterizing
      these injection vectors that bypass explicit override-pattern detectors.
    strength: primary
  - subcategory: MG.2.3
    context: >-
      Detection of authority-claiming language with corrective directives in
      external content triggers risk treatment plans to quarantine or sanitize
      the poisoned content before the agent acts on the redirected instructions;
      MG.2.3 requires these response mechanisms be pre-defined.
    strength: secondary
  - subcategory: GV.1.2
    context: >-
      Indirect authority claims attempt to subvert the accountability boundaries
      of the agent by impersonating an authoritative voice within ingested
      content; GV.1.2 requires that role and authority boundaries are enforced
      so external content cannot assume directive authority over the agent.
    strength: secondary
