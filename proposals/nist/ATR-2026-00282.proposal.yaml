rule_title: Perez-Style Direct Prompt Injection Hijacking
proposed_mapping:
  - subcategory: MP.5.1
    context: >-
      This rule detects Perez-style direct prompt injection variants
      (ignore-say, ignore-print, nevermind, screaming-stop, delimiter-escape)
      that are well-characterized adversarial inputs from the PromptInject
      taxonomy; MP.5.1 requires that the likelihood and magnitude of these
      documented GenAI injection risks are characterized and tracked at runtime.
    strength: primary
  - subcategory: MS.2.7
    context: >-
      Systematic coverage of the Perez et al. injection taxonomy provides
      continuous security/resilience evaluation evidence for the LLM against a
      known adversarial benchmark; MS.2.7 requires that AI system security and
      resilience be evaluated and documented against such attack suites.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Detected goal-hijacking imperatives and delimiter-escape overrides must
      trigger pre-defined risk treatment to disengage or suppress the hijacked
      response before it executes attacker-controlled instructions; MG.2.3
      mandates these supersede/deactivate mechanisms.
    strength: secondary
