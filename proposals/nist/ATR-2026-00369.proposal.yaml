    context: >-
      On match, the rule provides the trigger for response mechanisms that
      supersede or disengage the model from the adopted unconstrained oracle
      persona before unrestricted outputs are produced; MG.2.3 requires these
      deactivation pathways exist for jailbreak conditions.
    strength: secondary
