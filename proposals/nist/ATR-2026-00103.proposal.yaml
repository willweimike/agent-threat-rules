rule_title: Hidden LLM Safety Bypass Instructions in Tool Descriptions
proposed_mapping:
  - subcategory: MS.2.6
    context: >-
      Hidden 'NOTE TO AI' instructions embedded in tool descriptions are
      prompt-injection payloads targeting the LLM's core safety mechanisms;
      MS.2.6 requires continuous evaluation of safety/security risk magnitude,
      and each detection produces direct evidence of an active safety-bypass
      attempt against the deployed system.
    strength: primary
  - subcategory: MG.3.2
    context: >-
      Tool descriptions originate from third-party MCP servers and
      pre-integrated components, so malicious safety-bypass instructions hidden
      in those descriptions are a supply-chain risk; MG.3.2 requires monitoring
      of pre-trained models and integrated third-party AI components for
      tampering or adversarial content.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Detection of explicit safety-disregard instructions must trigger
      mechanisms to disengage or quarantine the offending tool before the LLM
      acts on the injected directive; MG.2.3 requires that such
      supersede/deactivate response paths are pre-defined and activated on
      detection.
    strength: secondary
