      keyword-based filters by rephrasing override instructions; MP.5.1 requires
      that the likelihood and magnitude of such evasion-based prompt injection
      risks are characterized and tracked as part of the GenAI threat profile.
    strength: primary
  - subcategory: MS.2.7
    context: >-
      Detecting softened paraphrases of instruction-override attacks provides
      continuous evaluation evidence of the AI system's resilience against
      prompt injection variants; MS.2.7 requires that security and resilience
      are evaluated and documented against evolving adversarial techniques.
    strength: secondary
  - subcategory: MG.2.3
    context: >-
      Matches on paraphrased override language trigger pre-defined containment
      actions to disengage or redirect the AI system before the injected
      instruction takes effect; MG.2.3 requires these supersede/deactivate
      mechanisms be available on detection.
    strength: secondary
