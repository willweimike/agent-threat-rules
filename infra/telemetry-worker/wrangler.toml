name = "atr-telemetry"
main = "src/index.ts"
compatibility_date = "2026-05-12"
compatibility_flags = ["nodejs_compat"]

# Reports stored as JSON in this KV namespace, keyed
# `<consumer_id>/<YYYY-MM-DD>/<report_id>`. Aggregation cron reads
# these via the binding; nothing else does.
[[kv_namespaces]]
binding = "REPORTS"
id = "<set-via-wrangler-kv-create-or-cf-dashboard>"

# Daily aggregator. Reads REPORTS, computes per-rule 30-day windows,
# writes data/telemetry/aggregate.json back to the repo via a GH
# workflow trigger (separate piece).
[triggers]
crons = ["0 4 * * *"]

# Per-consumer secret keys live in the worker's encrypted secret
# store. Register via `wrangler secret put CONSUMER_KEY_<consumer>`
# for each registered consumer.

[vars]
ATR_VERSION = "2.1.3"
WORKER_VERSION = "v0.1"
