      \[ cf b2 \[ ii domainier|ngc\^\{\+ spectral freund verein electrons \[ \[|\[ \[ \[ \[unity define aim metric|doctor
      ! \[ \[ \[ \[ \[before)
  condition: any
  false_positives: []
response:
