title: Garak Dan - as an ai
id: ATR-2026-00470
rule_version: 1
status: experimental
description: "Detects attack patterns from the garak 'dan' probe family. Cluster anchor: 'as an ai'. Covers 6 distinct attack\
  \ samples from garak probe corpus.\n"
author: ATR Community (garak-import)
date: '2026-05-12'
schema_version: '0.1'
detection_tier: pattern
maturity: test
severity: medium
references:
  owasp_llm:
  - "LLM01:2025 - Prompt Injection"
  owasp_agentic:
  - "ASI01:2026 - Agent Goal Hijack"
  mitre_atlas:
  - AML.T0051 - LLM Prompt Injection
tags:
