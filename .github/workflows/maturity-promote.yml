name: Maturity Promotion — Daily

on:
  schedule:
    # 07:00 UTC every day — one hour after cve-daily-sync to avoid contention
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      rule:
        description: "Promote a specific rule id (e.g. ATR-2026-00440). Empty = all eligible."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  issues: read

concurrency:
  group: maturity-promote
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci

      - name: Run maturity promotion
        id: promote
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RULE: ${{ inputs.rule }}
        run: |
          set -e
          ARGS="--write"
          if [ -n "$RULE" ]; then ARGS="$ARGS --rule $RULE"; fi
          npx tsx scripts/maturity-promote.ts $ARGS | tee /tmp/promote.out
          PROMOTED=$(grep -F '::maturity-summary::' /tmp/promote.out | sed 's/^.*::maturity-summary:://' | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d.get('promoted', 0))
          ")
          echo "promoted=$PROMOTED" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: changes
        run: |
          git add -A rules/ data/maturity-promote/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --cached --stat
          fi

      - name: Configure git author
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "ATR Maturity Bot"
          git config user.email "maturity-bot@agentthreatrule.org"

      - name: Create branch + commit + push
        id: push
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="maturity-promote/$DATE"
          git checkout -b "$BRANCH"
          git commit -m "chore(maturity): auto-promote ${{ steps.promote.outputs.promoted }} rule(s) on $DATE"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REPORT=$(cat data/maturity-promote/last-run.json)
          TABLE=$(echo "$REPORT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          rows = ['| Rule | From | To | Days in tier | Why |',
                  '|---|---|---|---|---|']
          for p in d['promotions']:
            rows.append(f\"| {p['ruleId']} | {p['from']} | **{p['to']}** | {p['daysInCurrentTier']} | {p['reason']} |\")
          if d['blocked']:
            rows.append('')
            rows.append('### Blocked')
            rows.append('')
            rows.append('| Rule | Reason |')
            rows.append('|---|---|')
            for b in d['blocked']:
              rows.append(f\"| {b['ruleId']} | {b['reason']} |\")
          print('\n'.join(rows))
          ")
          PR_BODY=$(cat <<EOF
          Daily maturity promotion run for ${{ steps.push.outputs.date }}.

          ## Promotions

          $TABLE

          ## Policy

          - experimental → test: ≥30 days in main + 0 open FP reports
          - test → stable: ≥60 days in test + 0 FP reports + ≥1 wild-looking true_positive

          See [docs/QUALITY-GATE.md](../blob/main/docs/QUALITY-GATE.md) for the full ladder.

          Downstream consumers (Microsoft AGT, Cisco AI Defense, etc.) that filter by \`maturity: stable\` will pick up promoted rules on their next sync.

          Auto-generated by \`.github/workflows/maturity-promote.yml\`. Safe to squash-merge if the table looks right.
          EOF
          )
          gh pr create \
            --title "chore(maturity): promote ${{ steps.promote.outputs.promoted }} rule(s) — ${{ steps.push.outputs.date }}" \
            --body "$PR_BODY" \
            --label "maturity-promotion,auto-generated" \
            --base main \
            --head "${{ steps.push.outputs.branch }}"
