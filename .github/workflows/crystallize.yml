name: Crystallize Rules from TC

on:
  workflow_run:
    workflows: ["Daily Ecosystem Scan"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commits)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  crystallize:
    name: Auto-crystallize rules from attack data
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build ATR engine
        run: npm run build

      - name: Count rules before
        id: before
        run: |
          count=$(find rules -name "*.yaml" | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Rules before crystallization: $count"

      - name: Run local crystallization
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        env:
          TC_URL: ${{ vars.TC_URL || 'https://tc.panguard.ai' }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          npx tsx scripts/local-crystallize.ts $DRY_RUN_FLAG || echo "Crystallization completed with warnings"

      - name: Validate new rules
        run: npm run validate

      - name: Run tests
        run: npm test

      - name: Count rules after
        id: after
        run: |
          count=$(find rules -name "*.yaml" | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Rules after crystallization: $count"

      - name: Generate stats.json (merge-preserve, not regenerate-clobber)
        # This step computes the fields it owns (version, generatedAt, rules,
        # ecosystem, benchmark) and MERGES them into the existing stats.json,
        # preserving any other top-level keys. Notably:
        #
        #   - `benchmarks` (array) — populated by Phase 6+ measurement layer
        #     via scripts/sync-stats-from-measurements.ts. Used by website
        #     lib/stats.ts to render version-pinned recall claims.
        #   - `benchmarks_generated_at` — sibling to `benchmarks`.
        #
        # Prior to this patch, this step regenerated the whole file from
        # scratch every cron tick, silently wiping the benchmarks[] field
        # added by sync-stats. The fix: read-first, preserve unknown keys.
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            // Count rules by category.
            const rulesDir = path.resolve('rules');
            const categories = fs.readdirSync(rulesDir).filter(d =>
              fs.statSync(path.join(rulesDir, d)).isDirectory()
            );
            const rulesByCategory = {};
            let totalRules = 0;
            for (const cat of categories) {
              const catDir = path.join(rulesDir, cat);
              const files = fs.readdirSync(catDir).filter(f => f.endsWith('.yaml'));
              rulesByCategory[cat] = files.length;
              totalRules += files.length;
            }

            // Load scan stats if available.
            let megaScan = { scanned: 0, flagged: 0 };
            try {
              const mega = JSON.parse(fs.readFileSync('data/mega-scan-report.json', 'utf8'));
              megaScan = { scanned: mega.totals?.scanned ?? 0, flagged: mega.totals?.flagged ?? 0 };
            } catch {}

            // Load benchmark stats if available (legacy flat 'benchmark' object).
            let benchmark = { recall: 0, precision: 0 };
            try {
              const pint = JSON.parse(fs.readFileSync('data/pint-benchmark/pint-eval-report.json', 'utf8'));
              benchmark = { recall: pint.report?.overall?.recall ?? 0, precision: pint.report?.overall?.precision ?? 0 };
            } catch {}

            // Read existing stats.json first (if present) so we preserve
            // unknown top-level keys like 'benchmarks' and
            // 'benchmarks_generated_at' that other workflows / scripts own.
            let existing = {};
            try {
              existing = JSON.parse(fs.readFileSync('data/stats.json', 'utf8'));
            } catch {}

            // Merge: this step's owned keys win; everything else is
            // preserved verbatim from the existing file.
            const stats = {
              ...existing,
              version: require('./package.json').version,
              generatedAt: new Date().toISOString(),
              rules: {
                total: totalRules,
                categories: Object.keys(rulesByCategory).length,
                byCategory: rulesByCategory,
              },
              ecosystem: {
                skillsScanned: megaScan.scanned,
                skillsFlagged: megaScan.flagged,
              },
              benchmark: {
                pintRecall: benchmark.recall,
                pintPrecision: benchmark.precision,
              },
            };

            fs.writeFileSync('data/stats.json', JSON.stringify(stats, null, 2) + '\n');
            const preserved = Object.keys(existing).filter(k =>
              !['version','generatedAt','rules','ecosystem','benchmark'].includes(k)
            );
            console.log('Generated data/stats.json:', JSON.stringify(stats.rules, null, 2));
            if (preserved.length > 0) {
              console.log('Preserved unknown top-level keys:', preserved.join(', '));
            }
          "

      - name: Commit new rules and stats
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "ATR Crystallizer"
          git config user.email "crystallizer@atr-framework.org"

          BEFORE=${{ steps.before.outputs.count }}
          AFTER=${{ steps.after.outputs.count }}
          NEW_RULES=$((AFTER - BEFORE))

          git add rules/ data/stats.json
          if git diff --cached --quiet; then
            echo "No new rules crystallized"
          else
            git commit -m "feat: auto-crystallize ${NEW_RULES} new rules (${BEFORE} -> ${AFTER} total)

            Source: TC ecosystem scan + adversarial samples
            Pipeline: local-crystallize.ts"
            git push
            echo "Committed ${NEW_RULES} new rules"
          fi
