name: Publish current package version to npm

# Emergency / manual-only workflow: publishes whatever version is currently
# in package.json to npm WITHOUT bumping or tagging.
# Use when the main publish-on-rules-merge workflow succeeded at the git
# step (version bumped + tagged) but the npm publish step failed.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-only:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish current version to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Publishing agent-threat-rules@${VERSION}"
          npm publish --access public
