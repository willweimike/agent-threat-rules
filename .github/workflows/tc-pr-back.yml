name: TC Rule PR-Back

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pr-back:
    name: Pull confirmed TC rules → PR to ATR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Validate TC API key
        env:
          TC_API_KEY: ${{ secrets.TC_API_KEY }}
          TC_URL: ${{ vars.TC_URL || 'https://tc.panguard.ai' }}
        run: |
          if [ -z "$TC_API_KEY" ]; then
            echo "::error::TC_API_KEY secret is not set."
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: TC_API_KEY   Value: your key from ${TC_URL}/settings"
            exit 1
          fi
          echo "TC_API_KEY is configured (${#TC_API_KEY} chars). Proceeding."

      - name: Build
        run: npm run build

      - name: Count rules before
        id: before
        run: |
          count=$(find rules -name "*.yaml" | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Pull confirmed rules from TC
        env:
          TC_URL: ${{ vars.TC_URL || 'https://tc.panguard.ai' }}
          # GET /api/atr-rules accepts any valid static key — no admin
          # privilege needed. The CLI's auth fallback chain (see
          # src/cli/tc-pipeline.ts) picks TC_ADMIN_API_KEY first then
          # TC_API_KEY. Passing both means either secret can satisfy
          # the call. Letting only TC_API_KEY remain lets us avoid the
          # admin-key sync drift that bit us 2026-05-27.
          TC_API_KEY: ${{ secrets.TC_API_KEY }}
        run: node dist/cli.js tc pull

      - name: Count rules after
        id: after
        run: |
          count=$(find rules -name "*.yaml" | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Run tests (regression gate)
        if: steps.before.outputs.count != steps.after.outputs.count
        run: npm test

      - name: Stage new rules locally (needed for safety gate diff)
        id: stage
        if: steps.before.outputs.count != steps.after.outputs.count
        run: |
          BRANCH="tc-rules-$(date +%Y%m%d-%H%M)"
          git config user.name "ATR Threat Cloud"
          git config user.email "bot@agentthreatrule.org"
          git checkout -b "$BRANCH"
          git add rules/ data/.tc-last-sync
          git commit -m "feat: pull ${{ steps.after.outputs.count }} crystallized rules from Threat Cloud"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Safety gate — check new rules against clean corpus
        id: safety
        if: steps.before.outputs.count != steps.after.outputs.count
        continue-on-error: true
        run: |
          set +e
          npx tsx scripts/check-rules-safety.ts --base origin/main | tee /tmp/safety.log
          EXIT=$?
          if [ $EXIT -eq 0 ]; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Create PR if new rules
        if: steps.before.outputs.count != steps.after.outputs.count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEFORE=${{ steps.before.outputs.count }}
          AFTER=${{ steps.after.outputs.count }}
          NEW_RULES=$((AFTER - BEFORE))
          BRANCH="${{ steps.stage.outputs.branch }}"
          SAFETY="${{ steps.safety.outputs.result }}"

          if [ "$NEW_RULES" -le 0 ]; then
            echo "No new rules"
            exit 0
          fi

          # Decide label set based on safety gate verdict (B2 auto-merge policy)
          if [ "$SAFETY" = "pass" ]; then
            LABELS="tc-crystallized,auto-mergeable"
            MERGE_NOTE="**Auto-merge enabled** — safety gate passed (test_cases present, 0 FP on benign corpus, ≤10 new rules, no MiroFish Predicted author)."
          else
            LABELS="tc-crystallized,needs-human-review"
            MERGE_NOTE="**Human review required** — safety gate flagged issues. See workflow log for details."
          fi

          git push origin "$BRANCH"

          # Build PR body with safety-gate verdict surfaced at top
          BODY=$(cat <<PREOF
          ## Summary

          Automated PR from Threat Cloud crystallization pipeline.

          ${MERGE_NOTE}

          - **New rules:** ${NEW_RULES}
          - **Source:** TC confirmed proposals (LLM self-review + 24hr canary + regression gate)
          - **Tests:** All passing
          - **Maturity:** All rules enter as \`experimental\` (alert-only, not blocking)
          - **Safety gate:** ${SAFETY}

          ### Automated quality gates
          - [x] LLM self-review (false positive risk assessment)
          - [x] 24-hour canary period (no false positives reported)
          - [x] ATR Quality Gate (RFC-001 v1.1 experimental: 3+ TP, 3+ TN)
          - [x] Schema validation (\`atr validate\`)
          - [x] Full test suite (\`npm test\`)
          - [$([ "$SAFETY" = "pass" ] && echo x || echo " ")] FP safety gate (0 FPs on 432-sample benign corpus)
          - [$([ "$SAFETY" = "pass" ] && echo x || echo " ")] test_cases completeness (true_positives + true_negatives)
          - [$([ "$SAFETY" = "pass" ] && echo x || echo " ")] Not authored by "MiroFish Predicted"
          - [$([ "$SAFETY" = "pass" ] && echo x || echo " ")] ≤ 10 new rules per PR

          ### If safety gate failed — human review checklist
          - [ ] **FP check**: Run patterns against 5 known-clean skills — 0 false positives
          - [ ] **Attack type**: Confirm OWASP Agentic + MITRE ATLAS mappings are correct
          - [ ] **Patterns target real attacks**, not generic language or report descriptions
          - [ ] **Test cases cover the attack scenario** (not just keywords)
          - [ ] **Severity matches real-world impact** (not auto-assigned)
          - [ ] **metadata_provenance** updated to \`human-reviewed\` for verified fields

          ### Why we added a safety gate
          TC crystallization uses LLM to generate rules from observed threats. LLMs can
          produce rules that detect report text instead of attack patterns (the MiroFish
          lesson). The automated safety gate is a first line of defence; when it passes
          we auto-merge to keep the flywheel running. When it fails, this PR stays open
          for human review.

          ---
          Generated by [ATR Threat Cloud](https://tc.panguard.ai) | Pipeline: tc-pr-back.yml
          PREOF
          )

          PR_URL=""
          if gh pr create \
            --title "feat: ${NEW_RULES} new rules from Threat Cloud crystallization" \
            --label "${LABELS}" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH" 2>&1
          then
            echo "PR created for ${NEW_RULES} new rules (labels=${LABELS})"
            if [ "$SAFETY" = "pass" ]; then
              PR_NUM=$(gh pr view "$BRANCH" --json number --jq .number)
              echo "Enabling auto-merge on PR #${PR_NUM}"
              gh pr merge "$PR_NUM" --auto --squash --delete-branch || echo "auto-merge not enabled (branch protection may require approvals)"
            fi
          else
            # Fallback — org blocks Actions from creating PRs.
            # Write to workflow summary so the maintainer can open it manually.
            REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
            NEW_PR_URL="${REPO_URL}/compare/main...${BRANCH}?expand=1"
            echo "## TC PR-Back: ${NEW_RULES} new rules ready for review" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "GitHub Actions could not auto-create the PR (org policy)." >> "$GITHUB_STEP_SUMMARY"
            echo "Branch \`${BRANCH}\` has been pushed. Open the PR manually:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "[Click here to create PR](${NEW_PR_URL})" >> "$GITHUB_STEP_SUMMARY"
            echo "Branch: ${BRANCH}, New rules: ${NEW_RULES}"
          fi
