name: Publish ATR patch on rules merge

# Auto-bumps patch version and publishes to npm when TC-crystallized rules
# land on main. Runs only for commits authored by the TC bot to avoid
# publishing on every human rules edit.
#
# Flow:
#   tc-pr-back.yml opens PR (auto-mergeable when safety gate passes)
#     → PR auto-merges to main (author = bot@agentthreatrule.org)
#     → this workflow fires, bumps patch version, runs tests, npm publish
#     → GitHub release tag created

on:
  push:
    branches: [main]
    paths:
      - 'rules/**'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (patch/minor/major). Default patch.'
        required: false
        default: 'patch'
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write
  id-token: write  # required by `npm publish --provenance`

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only run when the head commit was made by the TC bot. Prevents
    # human rule edits from triggering an auto-publish.
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'crystallized rules from Threat Cloud') ||
      github.event.head_commit.author.email == 'bot@agentthreatrule.org'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Bump version
        id: bump
        run: |
          git config user.name "ATR Release Bot"
          git config user.email "release@agentthreatrule.org"
          OLD=$(node -p "require('./package.json').version")
          BUMP="${{ github.event.inputs.bump_type || 'patch' }}"
          NEW=$(npm version "$BUMP" --no-git-tag-version --no-commit-hooks)
          NEW=${NEW#v}
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped ($BUMP): $OLD → $NEW"

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): v${{ steps.bump.outputs.new }} — auto-publish TC-crystallized rules

          Previous: v${{ steps.bump.outputs.old }}
          Trigger: auto-merge from tc-pr-back
          Commit: ${{ github.sha }}"
          # Remove orphaned tag from previous failed runs before re-creating
          git tag -d "v${{ steps.bump.outputs.new }}" 2>/dev/null || true
          git push origin :refs/tags/v${{ steps.bump.outputs.new }} 2>/dev/null || true
          git tag "v${{ steps.bump.outputs.new }}"
          git push origin main --tags

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_COUNT=$(find rules -name "*.yaml" | wc -l | tr -d ' ')
          gh release create "v${{ steps.bump.outputs.new }}" \
            --title "ATR v${{ steps.bump.outputs.new }} — TC crystallization batch" \
            --notes "Auto-published from Threat Cloud flywheel.

          - Previous: v${{ steps.bump.outputs.old }}
          - Total rules: ${NEW_COUNT}
          - Trigger commit: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          - Pipeline: tc-pr-back → safety gate → auto-merge → this release

          \`\`\`
          npm install agent-threat-rules@${{ steps.bump.outputs.new }}
          \`\`\`"
